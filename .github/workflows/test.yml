name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pocl-opencl-icd opencl-headers

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pyopencl h5py scipy matplotlib pillow coverage
        pip install -e .

    - name: Run unit tests with coverage
      env:
        PYOPENCL_CTX: "0"
        POCL_MAX_PTHREAD_COUNT: "1"
      run: |
        python tests/run_coverage.py

    - name: Run MEEP Feature Validation (Docker)
      env:
        PYOPENCL_CTX: "0"
      run: |
        python -m unittest tests.test_meep_validation -v

    - name: Run MEEP mid-plane golden images (Docker)
      env:
        PYOPENCL_CTX: "0"
        POCL_MAX_PTHREAD_COUNT: "1"
        IGNORE_GPU: "NVIDIA,AMD"
      run: |
        python -m unittest tests.test_meep_plane_baselines -v

    - name: Run MEEP far-field golden baselines (Docker)
      env:
        PYOPENCL_CTX: "0"
        POCL_MAX_PTHREAD_COUNT: "1"
        IGNORE_GPU: "NVIDIA,AMD"
      run: |
        python -m unittest tests.test_meep_farfield_baselines -v
