name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pocl-opencl-icd opencl-headers

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pyopencl h5py scipy matplotlib coverage
        pip install -e .

    - name: Run unit tests with coverage
      env:
        PYOPENCL_CTX: "0"
        # Reduce POCL workers; multi-context teardown is flaky under coverage.
        POCL_MAX_PTHREAD_COUNT: "1"
      run: |
        set -euo pipefail
        python -m coverage run -m unittest \
          tests.test_solver \
          tests.test_unit_engine \
          tests.test_unit_monitors \
          tests.test_unit_harness \
          -v
        python -m coverage report --fail-under=90
        python -m coverage xml

    - name: Run MEEP Feature Validation (Docker)
      env:
        PYOPENCL_CTX: "0"
      run: |
        python -m unittest tests.test_meep_validation -v
