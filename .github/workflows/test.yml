name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pocl-opencl-icd opencl-headers

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pyopencl h5py scipy matplotlib coverage
        pip install -e .

    - name: Run unit tests with coverage
      run: |
        export PYOPENCL_CTX=0
        python -m coverage run -m unittest \
          tests.test_solver \
          tests.test_unit_engine \
          tests.test_unit_monitors \
          tests.test_unit_harness \
          -v
        python -m coverage report --fail-under=90
        python -m coverage xml

    - name: Run MEEP Feature Validation (Docker)
      run: |
        export PYOPENCL_CTX=0
        python -m unittest tests.test_meep_validation -v
